<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --primary-green: #16a34a;
            --bg-gray: #f8fafc;
            --text-dark: #1e293b;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-gray);
            background-size: 40px 40px;
            margin: 0;
            color: var(--text-dark);
        }

        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            display: none;
            z-index: 1000;
        }

        /* HOME */
        .home { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; box-sizing: border-box; }
        .home h1 { font-size: 28px; font-weight: 700; color: var(--primary-blue); margin-bottom: 10px; }
        .opcoes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 600px; margin-bottom: 40px; }
        .opcao { padding: 24px; border-radius: 20px; background: var(--glass); border: 1px solid #e2e8f0; box-shadow: var(--shadow); cursor: pointer; transition: 0.3s; text-align: center; }
        .opcao:hover { transform: translateY(-5px); border-color: var(--primary-blue); }

        /* DASHBOARD NA HOME */
        .dash-container { width: 100%; max-width: 800px; background: white; padding: 25px; border-radius: 24px; box-shadow: var(--shadow); border: 1px solid #e2e8f0; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dash-header h2 { margin: 0; font-size: 18px; color: #64748b; }
        #graficoArea { width: 100%; max-height: 300px; margin-bottom: 20px; }

        /* TABELA DASH */
        .tabela-dash { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tabela-dash th { text-align: left; padding: 10px; border-bottom: 2px solid #f1f5f9; color: #64748b; }
        .tabela-dash td { padding: 10px; border-bottom: 1px solid #f1f5f9; }

        /* APP CONTAINER */
        .container { max-width: 800px; margin: 40px auto; padding: 30px; background: var(--glass); border-radius: 24px; box-shadow: var(--shadow); }
        .hidden { display: none !important; }
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 6px; display: block; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 15px; }

        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .azul { background: var(--primary-blue); color: white; }
        .verde { background: var(--primary-green); color: white; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; color: #475569; }

        .footer { text-align: center; margin-top: 40px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

<div id="toast">Item adicionado!</div>

<div id="home" class="home">
    <h1>Sistema de Estoque Pro</h1>
    <p style="color: #64748b; margin-bottom: 30px;">Gerenciamento de Auditoria e Pedidos</p>
    
    <div class="opcoes-grid">
        <div class="opcao" onclick="abrirApp('contagem')">
            <strong>📦 Contagem</strong>
        </div>
        <div class="opcao" onclick="abrirApp('pedido')">
            <strong>🛒 Pedido</strong>
        </div>
    </div>

    <div class="dash-container">
        <div class="dash-header">
            <h2>📊 Resumo de Operações (Real-time)</h2>
            <button class="btn btn-outline" style="padding: 5px 12px; font-size: 11px;" onclick="abrirDashRestrito()">🔄 Atualizar Dash</button>
        </div>
        
        <div id="status-dash" style="text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 10px;">Acesse para carregar os dados</div>
        
        <div id="area-restrita-dash" class="hidden">
            <div id="graficoArea">
                <canvas id="graficoUnidades"></canvas>
            </div>
            <table class="tabela-dash">
                <thead>
                    <tr>
                        <th>Unidade</th>
                        <th>Lançamentos</th>
                        <th>Último Lançamento</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela-dash"></tbody>
            </table>
        </div>
    </div>

    <div class="footer">Elielton Souza © 2026</div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <button class="btn btn-outline" style="margin-bottom:20px; padding: 8px 16px;" onclick="voltar()">← Voltar ao Menu</button>
        <h1 id="titulo" style="text-align:center; margin-bottom: 30px;">Contagem</h1>

        <div class="form-group">
            <div>
                <label>Responsável</label>
                <input type="text" id="responsavel" placeholder="Nome">
            </div>
            <div>
                <label>Unidade</label>
                <select id="unidade">
                    <option value="">Selecione</option>
                    <option>ANDORINHAS</option><option>BELA VISTA</option><option>BONFIM</option>
                    <option>CENTRO</option><option>CONQUISTA</option><option>CONSOLAÇÃO</option>
                    <option>CARATOÍRA</option><option>ITARARÉ</option><option>JARDIM CAMBURI</option>
                    <option>JARDIM DA PENHA</option><option>MARIA ORTIZ</option><option>QUADRO</option>
                    <option>ROMÃO</option><option>NOVA PALESTINA</option><option>SANTO ANDRÉ</option>
                    <option>SANTO ANTONIO</option><option>SÃO PEDRO</option><option>JABURU</option>
                    <option>NISP JABURU</option><option>SOLON BORGES</option><option>PRAIA DO SUÁ</option>
                </select>
            </div>
        </div>

        <div class="form-group" style="grid-template-columns: 2fr 1fr;">
            <div>
                <label>Produto</label>
                <input type="text" id="produto" list="listaProdutos" placeholder="Buscar...">
                <datalist id="listaProdutos"></datalist>
            </div>
            <div>
                <label>Quantidade</label>
                <input type="number" id="quantidade">
            </div>
        </div>

        <div class="form-group" style="grid-template-columns: 2fr 1fr;">
            <div>
                <label>Observação</label>
                <input type="text" id="observacao" placeholder="Ex: cor, defeito...">
            </div>
            <div>
                <label>Medida</label>
                <select id="medida">
                    <option>Unidade</option><option>Pacote</option><option>Caixa</option>
                    <option>LT</option><option>KG</option><option>Metro</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
            <button id="btnAdd" class="btn azul" onclick="adicionar()">➕ Adicionar Item</button>
            <button class="btn btn-outline" style="color:#ef4444" onclick="limpar()">🗑️ Limpar Tudo</button>
        </div>

        <div class="table-container">
            <table id="tabela">
                <thead><tr><th>Unidade</th><th>Produto</th><th>Qtd</th><th>Obs</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <button id="btnExcel" class="btn azul" style="width:100%; margin-top: 25px; height: 50px;" onclick="baixarExcel()">
            📥 FINALIZAR E ENVIAR DADOS
        </button>
    </div>
</div>

<script>
    let itens = [];
    let tipo = "contagem";
    let chartInstance = null;
    const SENHA_MESTRA = "1234"; 
    const URL_API = "SUA_URL_DO_APPS_SCRIPT_AQUI"; // <--- COLOQUE SUA URL AQUI

    const BASE_PRODUTOS = [
        { material: "DIDÁTICO", nome: "Agôgo", medida: "Unidade" },
        { material: "EXPEDIENTE", nome: "Papel A4", medida: "Caixa" },
        // ... (as outras centenas de produtos que você já tem)
    ];

    // LÓGICA DO DASHBOARD
    function abrirDashRestrito() {
        let senha = prompt("Acesso Restrito ao Auditor. Digite a senha:");
        if (senha === SENHA_MESTRA) {
            document.getElementById("area-restrita-dash").classList.remove("hidden");
            carregarDadosDash();
        } else {
            alert("Senha incorreta.");
        }
    }

    async function carregarDadosDash() {
        document.getElementById("status-dash").innerText = "⏳ Buscando dados no Sheets...";
        try {
            const response = await fetch(URL_API);
            const dados = await response.json();
            
            let resumo = {};
            dados.forEach(item => {
                resumo[item.Unidade] = (resumo[item.Unidade] || 0) + 1;
            });

            renderizarGrafico(resumo);
            renderizarTabelaDash(resumo, dados);
            document.getElementById("status-dash").innerText = "✅ Atualizado: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById("status-dash").innerText = "❌ Erro ao conectar.";
        }
    }

    function renderizarGrafico(resumo) {
        const ctx = document.getElementById('graficoUnidades').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(resumo),
                datasets: [{
                    label: 'Itens Lançados',
                    data: Object.values(resumo),
                    backgroundColor: '#2563eb'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function renderizarTabelaDash(resumo, dados) {
        const tbody = document.getElementById("corpo-tabela-dash");
        tbody.innerHTML = "";
        for (let unidade in resumo) {
            tbody.innerHTML += `<tr><td>${unidade}</td><td>${resumo[unidade]}</td><td>Ok</td></tr>`;
        }
    }

    // LÓGICA DO APP (LANÇAMENTOS)
    function abrirApp(t){
        tipo = t;
        document.getElementById("home").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("titulo").innerText = t === "contagem" ? "📦 Contagem" : "🛒 Pedido";
        carregarDatalist();
    }

    function voltar(){ 
        document.getElementById("home").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
    }

    function carregarDatalist(){
        const lista = document.getElementById("listaProdutos");
        lista.innerHTML = "";
        BASE_PRODUTOS.forEach(p => {
            let opt = document.createElement("option");
            opt.value = p.nome;
            lista.appendChild(opt);
        });
    }

    function adicionar(){
        const unidade = document.getElementById("unidade").value;
        const responsavel = document.getElementById("responsavel").value;
        const produto = document.getElementById("produto").value;
        const qtd = document.getElementById("quantidade").value;
        const material = BASE_PRODUTOS.find(p => p.nome === produto)?.material || "NÃO LISTADO";

        if(!unidade || !responsavel || !produto || qtd <= 0) return alert("Preencha tudo!");

        itens.unshift({
            unidade, responsavel, material, produto, 
            quantidade: qtd, medida: document.getElementById("medida").value, 
            observacao: document.getElementById("observacao").value
        });

        render();
        document.getElementById("produto").value = "";
        document.getElementById("quantidade").value = "";
    }

    function render(){
        let tbody = document.querySelector("#tabela tbody");
        tbody.innerHTML = "";
        itens.forEach((item, i) => {
            tbody.innerHTML += `<tr><td>${item.unidade}</td><td>${item.produto}</td><td>${item.quantidade}</td><td>${item.observacao}</td><td><button onclick="itens.splice(${i},1);render()">✕</button></td></tr>`;
        });
    }

    async function baixarExcel() {
        if (itens.length === 0) return alert("Lista vazia!");
        
        mostrarToast("🚀 Sincronizando...");
        try {
            await fetch(URL_API, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(itens)
            });
            alert("Dados Salvos no Sheets com Sucesso!");
            itens = [];
            render();
            voltar();
        } catch (e) {
            alert("Erro ao salvar online.");
        }
    }

    function mostrarToast(msg) {
        let t = document.getElementById("toast");
        t.innerText = msg; t.style.display = "block";
        setTimeout(() => { t.style.display = "none"; }, 2000);
    }

    function limpar(){ if(confirm("Limpar tudo?")) { itens = []; render(); } }
</script>
</body>
</html>
