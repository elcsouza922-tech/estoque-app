<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Estoque</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

/* HOME */
.home{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.home h1{
font-size:28px;
margin-bottom:10px;
}

.home p{
color:#666;
margin-bottom:30px;
}

.opcao{
width:280px;
padding:18px;
margin:10px;
border:none;
border-radius:12px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
text-align:left;
}

.opcao:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.opcao strong{
display:block;
font-size:16px;
margin-bottom:5px;
}

.opcao span{
font-size:13px;
color:#666;
}

/* APP */
.container{
max-width:650px;
margin:auto;
padding:20px;
background:white;
margin-top:20px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.hidden{
display:none;
}

h1{
text-align:center;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

/* BOTÕES PADRÃO */
.btn{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}


/* CORES */
.azul{ background:#64b5f6; }
.azul:hover{ background:#42a5f5; }

.verde{ background:#66bb6a; }
.verde:hover{ background:#4caf50; }

.cinza{ background:#d9d9d9; color:#333; }
.cinza:hover{ background:#c4c4c4; }

table{
width:100%;
margin-top:25px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

.remover{
background:#e53935;
color:white;
border:none;
border-radius:50%;
width:24px;
height:24px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

/* RODAPÉ */
.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#888;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="home">
<h1>Selecione a opção desejada</h1>
<p>Escolha abaixo o tipo de operação</p>

<div class="opcao" onclick="abrirApp('contagem')">

</div>

<div class="opcao" onclick="abrirApp('pedido')">

</div>

<div class="footer">Elielton Souza © 2026</div>
</div>

<div class="container">

<div class="footer">Elielton Souza © 2026</div>

</div>

function carregarProdutos(){
let lista = document.getElementById("listaProdutos")
lista.innerHTML = ""

baseProdutos.forEach(p=>{
let option = document.createElement("option")
option.value = p.nome
lista.appendChild(option)
})
}

carregarProdutos()

document.getElementById("produto").addEventListener("change", function(){
document.getElementById("medida").focus()
})

function abrirApp(t){
tipo = t

itens = []
document.getElementById("responsavel").value = ""
document.getElementById("unidade").value = "Selecione"

document.getElementById("home").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

document.getElementById("titulo").innerText =
tipo === "pedido" ? "Pedido de Compra" : "Contagem de Estoque"

/* MUDA COR DOS BOTÕES */
let cor = tipo === "pedido" ? "verde" : "azul"

document.getElementById("btnAdd").className = "btn " + cor
document.getElementById("btnExcel").className = "btn " + cor
document.getElementById("btnLimpar").className = "btn " + cor

render()
}

function voltar(){
if(confirm("Deseja sair? Todos os dados serão perdidos.")){
limpar()
document.getElementById("home").classList.remove("hidden")
document.getElementById("app").classList.add("hidden")
}
}

function adicionar(){
let unidade = document.getElementById("unidade").value
let produto = document.getElementById("produto").value
let medida = document.getElementById("medida").value
let quantidade = Number(document.getElementById("quantidade").value)

if(tipo === "pedido" && document.getElementById("responsavel").value == ""){
alert("Informe o responsável")
return
}

if(produto == "" || quantidade == "") return

// 🔥 VERIFICA SE JÁ EXISTE
let existente = itens.find(i => 
i.produto === produto && 
i.unidade === unidade && 
i.medida === medida
)

if(existente){
existente.quantidade += quantidade
} else {
itens.unshift({unidade, produto, medida, quantidade}) // já entra no topo
}

render()

document.getElementById("produto").value = ""
document.getElementById("quantidade").value = ""
}

function render(){
let tbody = document.querySelector("#tabela tbody")
tbody.innerHTML = ""

itens.forEach((item,i)=>{
tbody.innerHTML += `
<tr>
<td>${item.unidade}</td>
<td>${item.produto}</td>
<td>${item.medida}</td>
<td>${item.quantidade}</td>
<td><button class="remover" onclick="remover(${i})">x</button></td>
</tr>`
})
}

function remover(i){
itens.splice(i,1)
render()
}

function limpar(){
if(!confirm("Deseja realmente limpar os dados? Todas as informações serão perdidas.")){
return
}

itens = []
document.getElementById("responsavel").value = ""
document.getElementById("unidade").value = "Selecione"
document.getElementById("produto").value = ""
document.getElementById("medida").value = "Selecione"
document.getElementById("quantidade").value = ""
render()
}

function baixarExcel(){
let unidade = document.getElementById("unidade").value
let responsavel = document.getElementById("responsavel").value

let data = new Date().toLocaleDateString().replace(/\//g,"-")

let nome =
(tipo === "pedido" ? "pedido" : "estoque")
+ "_" + unidade + "_" + data + ".xlsx"

// 🔥 MONTA BASE COMPLETA (com zeros)
let dados = baseProdutos.map(base => {

// procura se item foi lançado
let encontrado = itens.find(i => i.produto === base.nome)

return {
Unidade: unidade,
Material: base.material,
Produto: base.nome,
Medida: encontrado ? encontrado.medida : "",
Quantidade: encontrado ? encontrado.quantidade : 0,
Responsavel: responsavel
}
})

// 🔥 ADICIONA ITENS ATÍPICOS (não estão na base)
itens.forEach(i => {
let existeNaBase = baseProdutos.find(p => p.nome === i.produto)

if(!existeNaBase){
dados.push({
Unidade: i.unidade,
Material: "Não listado - Atípico",
Produto: i.produto,
Medida: i.medida,
Quantidade: i.quantidade,
Responsavel: responsavel
})
}
})

let ws = XLSX.utils.json_to_sheet(dados)

// 🔥 AUTO AJUSTE DE COLUNAS
let colWidths = []

dados.forEach(row => {
Object.keys(row).forEach((key, i) => {
let tamanho = String(row[key]).length
colWidths[i] = Math.max(colWidths[i] || key.length, tamanho)
})
})

ws['!cols'] = colWidths.map(w => ({ wch: w + 2 }))

let wb = XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb, ws, "Dados")

XLSX.writeFile(wb, nome)

// limpa tudo após baixar
limpar()
}
</script>
