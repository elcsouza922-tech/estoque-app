<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Estoque</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

/* HOME (VOLTOU AO NORMAL) */
.home{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.opcao{
width:280px;
padding:18px;
margin:10px;
border:none;
border-radius:12px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
text-align:left;
}

.opcao strong{
display:block;
font-size:16px;
margin-bottom:5px;
}

.opcao span{
display:block;
font-size:13px;
color:#666;
}

.opcao:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

/* APP */
.container{
max-width:650px;
margin:20px auto;
padding:20px;
border-radius:12px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.hidden{
display:none;
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:12px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

/* 🔥 BOTÕES DAS ABAS (AGORA CORRETO E SEPARADO) */
.btn-home{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:all 0.2s ease;
display:block;
}

/* CORES */
.contagem .btn-home{
background:#cfe8ff;
}

.pedido .btn-home{
background:#d9fbe6;
}

.btn-home:hover{
transform:translateY(-2px);
}

/* TABELA */
.table-box{
margin-top:20px;
padding:15px;
border-radius:12px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.remover{
background:#e53935;
color:white;
border:none;
border-radius:50%;
width:24px;
height:24px;
cursor:pointer;
}

/* RODAPÉ */
.footer{
text-align:center;
font-size:13px;
color:#777;
margin:20px 0;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="home">
<h1>Selecione a opção desejada</h1>
<p>Escolha abaixo o tipo de operação</p>

<div class="opcao" onclick="abrirApp('contagem')">
<strong>📦 Contagem de Estoque</strong>
<span>Registrar quantidades dos produtos</span>
</div>

<div class="opcao" onclick="abrirApp('pedido')">
<strong>🛒 Pedido de Compra</strong>
<span>Solicitar reposição de materiais</span>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div id="containerApp" class="container">

<button class="btn-home" onclick="voltar()">⬅ Voltar</button>

<h1 id="titulo">Contagem de Estoque</h1>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<label>Responsável</label>
<input type="text" id="responsavel">

<label>Unidade</label>
<select id="unidade">
<option>Selecione</option>
<option>ANDORINHAS</option>
<option>BELA VISTA</option>
<option>BONFIM</option>
<option>CENTRO</option>
<option>CONQUISTA</option>
</select>

<label>Produto</label>
<input type="text" id="produto">

<label>Medida</label>
<select id="medida">
<option>Selecione</option>
<option>Caixa</option>
<option>Pacote</option>
<option>Litro</option>
<option>Metro</option>
<option>Unidade</option>
</select>

<label>Quantidade</label>
<input type="number" id="quantidade" inputmode="numeric">

<button class="btn-home" onclick="adicionar()">➕ Adicionar</button>
<button class="btn-home" onclick="baixarExcel()">⬇ Baixar Excel</button>
<button class="btn-home" onclick="limpar()">🧹 Limpar Dados</button>

<div class="table-box">
<table id="tabela">
<thead>
<tr>
<th>Unidade</th>
<th>Produto</th>
<th>Medida</th>
<th>Qtd</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="footer">
Feito por <strong>Elielton Souza</strong>
</div>

</div>
</div>

<script>
let itens = []
let tipo = "contagem"

function abrirApp(t){
tipo = t

let container = document.getElementById("containerApp")
container.classList.remove("contagem","pedido")
container.classList.add(tipo)

itens = []
document.getElementById("responsavel").value = ""
document.getElementById("unidade").value = "Selecione"

document.getElementById("home").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

document.getElementById("titulo").innerText =
tipo === "pedido" ? "Pedido de Compra" : "Contagem de Estoque"

render()
}

function voltar(){
if(confirm("Deseja sair? Todos os dados serão perdidos.")){
limpar()
document.getElementById("home").classList.remove("hidden")
document.getElementById("app").classList.add("hidden")
}
}

function adicionar(){
let unidade = document.getElementById("unidade").value
let produto = document.getElementById("produto").value
let medida = document.getElementById("medida").value
let quantidade = document.getElementById("quantidade").value

if(tipo === "pedido" && document.getElementById("responsavel").value == ""){
alert("Informe o responsável")
return
}

if(produto == "" || quantidade == "") return

itens.push({unidade, produto, medida, quantidade})

render()

document.getElementById("produto").value = ""
document.getElementById("quantidade").value = ""
}

function render(){
let tbody = document.querySelector("#tabela tbody")
tbody.innerHTML = ""

itens.forEach((item,i)=>{
tbody.innerHTML += `
<tr>
<td>${item.unidade}</td>
<td>${item.produto}</td>
<td>${item.medida}</td>
<td>${item.quantidade}</td>
<td><button class="remover" onclick="remover(${i})">x</button></td>
</tr>`
})
}

function remover(i){
itens.splice(i,1)
render()
}

function limpar(){
itens = []
document.getElementById("responsavel").value = ""
document.getElementById("unidade").value = "Selecione"
document.getElementById("produto").value = ""
document.getElementById("quantidade").value = ""
render()
}

function baixarExcel(){
let unidade = document.getElementById("unidade").value
let responsavel = document.getElementById("responsavel").value

let data = new Date().toLocaleDateString().replace(/\//g,"-")

let nome =
(tipo === "pedido" ? "pedido" : "estoque")
+ "_" + unidade + "_" + data + ".xlsx"

let dados = itens.map(i=>({
Unidade:i.unidade,
Produto:i.produto,
Medida:i.medida,
Quantidade:i.quantidade,
Responsavel:responsavel
}))

let ws = XLSX.utils.json_to_sheet(dados)
let wb = XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb, ws, "Dados")

XLSX.writeFile(wb, nome)

limpar()
}
</script>

</body>
</html>
