<title>Contagem de Estoque</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.container{
max-width:650px;
margin:auto;
padding:20px;
background:white;
margin-top:20px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2f7df6;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e63cc;
}

.sugestoes{
background:white;
border:1px solid #ddd;
max-height:150px;
overflow-y:auto;
}

.sugestoes div{
padding:8px;
cursor:pointer;
}

.sugestoes div:hover{
background:#f0f0f0;
}

table{
width:100%;
margin-top:25px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

.remover{
background:#e53935;
color:white;
border:none;
border-radius:50%;
width:24px;
height:24px;
cursor:pointer;
font-size:14px;

display:flex;
align-items:center;
justify-content:center;
padding:0;
}

footer{
text-align:center;
margin-top:40px;
font-size:13px;
color:#777;
}

</style>
</head>

<h1>Contagem de Estoque</h1>

<input type="text" id="busca" placeholder="Digite o nome do produto">

let itens = JSON.parse(localStorage.getItem("estoque")) || []

function salvar(){

localStorage.setItem("estoque", JSON.stringify(itens))

}

let busca = document.getElementById("busca")
let sugestoes = document.getElementById("sugestoes")

busca.addEventListener("input", function(){

let texto = this.value.toLowerCase()

sugestoes.innerHTML=""

if(texto.length<2) return

let resultados = baseProdutos
.filter(p => p.nome.toLowerCase().includes(texto))
.sort((a,b)=>a.nome.localeCompare(b.nome))

resultados.forEach(produto=>{

let div=document.createElement("div")

div.innerText=produto.nome

div.onclick=()=>{

busca.value=produto.nome
sugestoes.innerHTML=""

}

sugestoes.appendChild(div)

})

})

function adicionar(){

let unidade=document.getElementById("unidade").value
let nome=busca.value
let medida=document.getElementById("medida").value
let qtd=parseFloat(document.getElementById("quantidade").value)

if(!nome||!qtd) return

let produtoBase=baseProdutos.find(p=>p.nome===nome)

let material=produtoBase?produtoBase.material:"Não listado"

let existente=itens.find(i=>i.nome===nome && i.unidade===unidade)

if(existente){

existente.qtd+=qtd

}else{

itens.push({
unidade,
material,
nome,
medida,
qtd
})

}

render()

busca.value=""
document.getElementById("quantidade").value=""

}

function render(){

let tbody=document.querySelector("#tabela tbody")

tbody.innerHTML=""

itens.forEach((item,index)=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${item.unidade}</td>
<td>${item.material}</td>
<td>${item.nome}</td>
<td>${item.medida}</td>
<td>${item.qtd}</td>
<td><button class="remover" onclick="remover(${index})">✕</button></td>
`

tbody.appendChild(tr)

})

}

function remover(index){

itens.splice(index,1)

render()

}

function baixarExcel(){

let unidade = document.getElementById("unidade").value || "UNIDADE"

let dados = []

dados.push(["Unidade","Material","Produto","Medida","Quantidade"])

/* PRODUTOS DA BASE */

baseProdutos.forEach(p=>{

let encontrado = itens.find(i=>i.nome == p.nome)

let qtd = encontrado ? encontrado.qtd : 0
let medida = encontrado ? encontrado.medida : ""

dados.push([
unidade,
p.material,
p.nome,
medida,
qtd
])

})


/* ITENS NÃO LISTADOS */

itens.forEach(i=>{

let existeNaBase = baseProdutos.some(p => p.nome == i.nome)

if(!existeNaBase){

dados.push([
unidade,
"Não listado",
i.nome,
i.medida,
i.qtd
])

}

})


let ws = XLSX.utils.aoa_to_sheet(dados)

ws["!cols"] = [
{wch:18},
{wch:22},
{wch:55},
{wch:15},
{wch:12}
]

let wb = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb, ws, "Estoque")


let hoje = new Date()

let data =
hoje.getDate().toString().padStart(2,"0") + "-" +
(hoje.getMonth()+1).toString().padStart(2,"0") + "-" +
hoje.getFullYear()

let nomeArquivo = "estoque_" + unidade + "_" + data + ".xlsx"

XLSX.writeFile(wb, nomeArquivo)

}


function limpar(){

if(!confirm("Deseja apagar toda a contagem?")) return

itens = []

render()

}

render()

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

document.getElementById("importarCSV").addEventListener("change", function(e){

let file = e.target.files[0]

if(!file) return

let reader = new FileReader()

reader.onload = function(event){

let data = new Uint8Array(event.target.result)

let workbook = XLSX.read(data,{type:"array"})

let sheet = workbook.Sheets[workbook.SheetNames[0]]

let linhas = XLSX.utils.sheet_to_json(sheet,{header:1})

itens = []

linhas.forEach((linha,i)=>{

if(i==0) return

let unidade = String(linha[0] || "").trim()
let material = String(linha[1] || "").trim()
let nome = String(linha[2] || "").trim()
let medida = String(linha[3] || "").trim()
let qtd = Number(linha[4]) || 0

if(!nome) return

itens.push({
unidade:unidade,
material:material,
nome:nome,
medida:medida,
qtd:qtd
})

})

render()

alert("Planilha importada com sucesso")

}

reader.readAsArrayBuffer(file)

})

</script>
